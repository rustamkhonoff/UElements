name: Rename Samples folder

on:
  workflow_dispatch:

  push:
    branches:
      - develop
    paths:
      - "Assets/src/UElements.OdinInspector/Samples/**"
      - "Assets/src/UElements.OdinInspector/Samples.meta"
      - ".github/workflows/rename-samples.yml"

permissions:
  contents: write

jobs:
  rename-samples:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rename Samples to Samples~
        shell: bash
        run: |
          OLD_PATH="Assets/src/UElements.OdinInspector/Samples"
          NEW_PATH="Assets/src/UElements.OdinInspector/Samples~"

          OLD_META="Assets/src/UElements.OdinInspector/Samples.meta"
          NEW_META="Assets/src/UElements.OdinInspector/Samples~.meta"

          echo "Checking path: $OLD_PATH"

          if [ ! -d "$OLD_PATH" ]; then
            echo "Folder not found: $OLD_PATH"
            echo "Available folders:"
            ls -la "Assets/src/UElements.OdinInspector" || true
            exit 0
          fi

          if [ -d "$NEW_PATH" ]; then
            echo "Target folder already exists: $NEW_PATH"
            exit 0
          fi

          git mv "$OLD_PATH" "$NEW_PATH"

          if [ -f "$OLD_META" ]; then
            git mv "$OLD_META" "$NEW_META"
          fi

          if git diff --cached --quiet; then
            echo "Nothing to rename"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "Rename Samples to Samples~ [skip ci]"
          git push
