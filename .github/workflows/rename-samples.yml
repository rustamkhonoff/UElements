name: Rename Samples folder

on:
  push:
    branches:
      - develop
    paths:
      - "Assets/src/Elements.OdinInspector/Samples/**"
      - "Assets/src/Elements.OdinInspector/Samples.meta"

permissions:
  contents: write

jobs:
  rename-samples:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rename Samples to Samples~
        shell: bash
        run: |
          OLD_PATH="Assets/src/Elements.OdinInspector/Samples"
          NEW_PATH="Assets/src/Elements.OdinInspector/Samples~"

          OLD_META="Assets/src/Elements.OdinInspector/Samples.meta"
          NEW_META="Assets/src/Elements.OdinInspector/Samples~.meta"

          if [ -d "$OLD_PATH" ] && [ ! -d "$NEW_PATH" ]; then
            git mv "$OLD_PATH" "$NEW_PATH"
          fi

          if [ -f "$OLD_META" ] && [ ! -f "$NEW_META" ]; then
            git mv "$OLD_META" "$NEW_META"
          fi

          if git diff --cached --quiet; then
            echo "Nothing to rename"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "Rename Samples to Samples~ [skip ci]"
          git push
