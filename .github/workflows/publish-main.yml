name: Publish package to main

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Preserve workflow file
        shell: bash
        run: |
          mkdir -p /tmp/preserved-workflows
          cp .github/workflows/publish-main.yml /tmp/preserved-workflows/publish-main.yml || true

      - name: Prepare all SamplesDev folders for publish
        shell: bash
        run: |
          echo "Searching for SamplesDev folders..."

          FOUND=0

          while IFS= read -r DEV_SAMPLES; do
            FOUND=1

            PARENT_DIR="$(dirname "$DEV_SAMPLES")"
            PUBLISH_SAMPLES="$PARENT_DIR/Samples~"

            DEV_META="$DEV_SAMPLES.meta"
            PUBLISH_META="$PUBLISH_SAMPLES.meta"

            echo "Processing:"
            echo "  From: $DEV_SAMPLES"
            echo "  To:   $PUBLISH_SAMPLES"

            rm -rf "$PUBLISH_SAMPLES"
            rm -f "$PUBLISH_META"

            mv "$DEV_SAMPLES" "$PUBLISH_SAMPLES"

            # Важно: meta-файл самой папки SamplesDev/Samples~ не нужен
            rm -f "$DEV_META"
            rm -f "$PUBLISH_META"

          done < <(find . -type d -name "SamplesDev")

          if [ "$FOUND" -eq 0 ]; then
            echo "No SamplesDev folders found"
          fi

          # На всякий случай удаляем все meta-файлы папок Samples~
          find . -type f -name "Samples~.meta" -delete

      - name: Restore workflow file
        shell: bash
        run: |
          mkdir -p .github/workflows
          cp /tmp/preserved-workflows/publish-main.yml .github/workflows/publish-main.yml || true

      - name: Publish to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Publish package from develop" || echo "No changes to commit"

          git push origin HEAD:main --force
